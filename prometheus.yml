global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:

  - job_name: 'api-gateway'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['healthsys-api-gateway:8080']

  - job_name: 'servico-usuarios'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['healthsys-servico-usuarios:8084']

  - job_name: 'servico-pacientes'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['healthsys-servico-pacientes:8081']

  - job_name: 'servico-triagem'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['healthsys-servico-triagem:8083']

  - job_name: 'servico-notificacoes'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['healthsys-servico-notificacoes:8085']