services:
  api-gateway:
    build: .
    container_name: healthsys-api-gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - rabbitmq
      - redis
    networks:
      - healthsys-network
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    container_name: healthsys-redis
    ports:
      - "6379:6379"
    networks:
      - healthsys-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: healthsys-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - healthsys-network

networks:
  healthsys-network:
    external: true