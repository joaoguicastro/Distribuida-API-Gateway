services:
  api-gateway:
    build: .
    container_name: healthsys-api-gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - rabbitmq
      - redis
    networks:
      - healthsys-network
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    container_name: healthsys-redis
    ports:
      - "6379:6379"
    networks:
      - healthsys-network
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    container_name: healthsys-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - healthsys-network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: healthsys-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - healthsys-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: healthsys-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: healthsys
    networks:
      - healthsys-network
    restart: unless-stopped

networks:
  healthsys-network:
    external: true