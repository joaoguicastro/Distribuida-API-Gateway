# ===== SERVIDOR =====
server.port=8080

  # ===== APLICACAO =====
spring.application.name=api-gateway

  # ===== REDIS (Rate Limiting) =====
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

  # ===== ROTAS DO GATEWAY =====


  # ===== CORS GLOBAL =====
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*

  # ===== EUREKA (Service Discovery) =====
  # Sera habilitado quando o Eureka Server estiver pronto
spring.cloud.netflix.eureka.client.enabled=false

  # ===== EUREKA CLIENT =====
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka}
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

  # ===== ACTUATOR (Health Check / Metricas) =====
management.endpoints.web.exposure.include=health,info,metrics,prometheus,gateway
management.endpoint.health.show-details=always
management.endpoint.gateway.enabled=true
management.metrics.export.prometheus.enabled=true

  # ===== LOGS =====
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.root=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n