# =========================================
# SERVIDOR
# =========================================
server:
  port: 8080

# =========================================
# APLICA«√O
# =========================================
spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:

        # -------------------------------
        # PACIENTE SERVICE
        # -------------------------------
        - id: paciente-service
          uri: http://localhost:8081
          predicates:
            - Path=/paciente/**

        # -------------------------------
        # USU¡RIO SERVICE
        # -------------------------------
        - id: usuario-service
          uri: http://localhost:8082
          predicates:
            - Path=/usuario/**

        # -------------------------------
        # AUTH (LOGIN)
        # -------------------------------
        - id: auth-service
          uri: http://localhost:8082
          predicates:
            - Path=/auth/**

      # -------------------------------
      # CORS GLOBAL
      # -------------------------------
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"

# =========================================
# ACTUATOR
# =========================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,gateway

  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true

# =========================================
# LOGS
# =========================================
logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    root: INFO