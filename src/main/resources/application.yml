server:
  port: 8080

spring:
  application:
    name: api-gateway

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}

  cloud:
    discovery:
      enabled: false
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials Vary, RETAIN_UNIQUE
      # CORS centralizado no gateway.
      # IMPORTANTE: desativar CORS nos servicos downstream
      # para evitar headers duplicados (Access-Control-Allow-Origin dobrado).
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://127.0.0.1:3000"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true
            exposedHeaders:
              - "Authorization"

      routes:
        # AUTH — Login e autenticacao (publico)
        - id: auth-service
          uri: http://${USUARIOS_HOST:healthsys-servico-usuarios}:8084
          predicates:
            - Path=/auth/**

        # USUARIOS — Cadastro de usuarios (publico)
        - id: usuario-service
          uri: http://${USUARIOS_HOST:healthsys-servico-usuarios}:8084
          predicates:
            - Path=/usuario/**

        # ADMIN — Endpoints administrativos (roteado para servico-usuarios)
        - id: admin-service
          uri: http://${USUARIOS_HOST:healthsys-servico-usuarios}:8084
          predicates:
            - Path=/admin/**

        # MEDICO — Endpoints exclusivos de medicos
        - id: medico-service
          uri: http://${MEDICO_HOST:healthsys-servico-medicos}:8082
          predicates:
            - Path=/medico/**

        # RECEPCIONISTA — Endpoints de recepcionistas
        - id: recepcionista-service
          uri: http://${RECEPCIONISTA_HOST:healthsys-servico-recepcionista}:8086
          predicates:
            - Path=/recepcionista/**

        # PACIENTES — CRUD de pacientes
        - id: paciente-service
          uri: http://${PACIENTES_HOST:healthsys-servico-pacientes}:8081
          predicates:
            - Path=/paciente/**

        # TRIAGEM — Classificacao de risco
        - id: triagem-service
          uri: http://${TRIAGEM_HOST:healthsys-servico-triagem}:8083
          predicates:
            - Path=/triagem/**

        # NOTIFICACOES — Alertas e avisos
        - id: notificacao-service
          uri: http://${NOTIFICACAO_HOST:healthsys-servico-notificacoes}:8085
          predicates:
            - Path=/notificacao/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,gateway
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    reactor.netty.http.client: DEBUG
    root: INFO
